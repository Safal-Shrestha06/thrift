<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login - Thriftko Clone</title>
		<link rel="stylesheet" href="thrift.css" />
	</head>
	<body>
		<main class="form-page">
			<section class="auth-panel">
				<h1>Welcome Back</h1>
				<p>Log in to continue shopping and managing your thrift listings.</p>
				<form class="auth-form" action="#" method="post">
					<label>
						Email address
						<input
							type="email"
							name="email"
							placeholder="you@example.com"
							required
						/>
					</label>
					<label>
						Password
						<input
							type="password"
							name="password"
							placeholder="Enter your password"
							required
						/>
					</label>
					<button class="btn btn-primary" type="submit">Login</button>
				</form>
				<p class="auth-link">
					New here? <a href="signup.html">Create an account</a>
				</p>
			</section>
		</main>
	</body>
</html>
