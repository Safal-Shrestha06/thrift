<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sign Up - Thriftko Clone</title>
		<link rel="stylesheet" href="thrift.css" />
	</head>
	<body>
		<main class="form-page">
			<section class="auth-panel">
				<h1>Create Account</h1>
				<p>
					Join the thrift movement and start selling or shopping pre-loved
					fashion.
				</p>
				<form class="auth-form" id="signupForm">
					<label>
						Full name
						<input type="text" id="signupName" placeholder="Your name" required />
					</label>
					<label>
						Email address
						<input
							type="email"
							id="signupEmail"
							placeholder="you@example.com"
							required
						/>
					</label>
					<label>
						Password
						<input
							type="password"
							id="signupPassword"
							placeholder="Create a password (min 6 characters)"
							required
							minlength="6"
						/>
					</label>
					<p id="signupError" style="color:#c94b4b; font-weight:600; display:none; margin:0;"></p>
					<button class="btn btn-primary" type="submit">Sign Up</button>
				</form>
				<p class="auth-link">
					Already have an account? <a href="login.html">Login</a>
				</p>
			</section>
		</main>

		<script type="module" src="signup.js"></script>
	</body>
</html>
