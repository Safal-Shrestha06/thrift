<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Returns - ThriftStore</title>
		<link rel="stylesheet" href="thrift.css" />
	</head>
	<body>
		<div class="page-shell">
			<header class="site-header">
				<a class="brand" href="thrift.html">
					<div class="brand-mark">Thrift</div>
					<span>ThriftStore</span>
				</a>
			</header>

			<section class="collection-section">
				<div class="section-header">
					<div>
						<p class="section-label">Returns</p>
						<h2>Return Policy</h2>
					</div>
				</div>
				<div class="product-card" style="padding: 28px">
					<p>Returns are accepted within 14 days of delivery.</p>
					<p>
						Items must be unworn, unwashed, and in the same condition as
						received.
					</p>
					<p>
						Please contact us before returning so we can assist with the
						process.
					</p>
				</div>
			</section>
		</div>
	</body>
</html>
